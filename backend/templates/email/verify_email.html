<!DOCTYPE html>

<html>

<body
  style="
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 20px;
  "
>

  <div
    style="
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    "
  >

    <h2
      style="
        color: darkslateblue;
        margin-bottom: 10px;
      "
    >

      Verify Your Email

    </h2>

    <p
      style="
        color: #555;
        font-size: 14px;
      "
    >

      Thank you for registering with
      <b>Travel Billing</b>.

      Please click the button below
      to verify your email.

    </p>

    <a
      href="{{ verify_link }}"
      target="_blank"
      style="
        display: inline-block;
        margin-top: 20px;
        padding: 12px 20px;
        background-color: darkslateblue;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
      "
    >

      Verify Email

    </a>

    <p
      style="
        margin-top: 20px;
        font-size: 12px;
        color: #888;
      "
    >

      If you did not create this account,
      you can safely ignore this email.

    </p>

  </div>

</body>

</html>
